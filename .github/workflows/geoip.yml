name: Update GeoIP

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download GeoLite2 and show HTTP status
        shell: bash
        run: |
          set -euxo pipefail

          URL="https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country&license_key=${{ secrets.MAXMIND_LICENSE_KEY }}&suffix=tar.gz"

          HTTP_CODE=$(curl -L \
            -o geoip.tar.gz \
            -D headers.txt \
            -w "%{http_code}" \
            "$URL")

          echo "HTTP_CODE=$HTTP_CODE"
          echo "===== RESPONSE HEADERS ====="
          cat headers.txt || true
          echo "===== FILE INFO ====="
          ls -lh geoip.tar.gz || true
          file geoip.tar.gz || true

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Download failed with HTTP status $HTTP_CODE"
            exit 1
          fi

      - name: Validate archive
        shell: bash
        run: |
          set -euxo pipefail
          tar -tzf geoip.tar.gz >/dev/null

      - name: Extract mmdb
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p extracted
          tar -xzf geoip.tar.gz -C extracted
          MMDB_PATH="$(find extracted -type f -name 'GeoLite2-Country.mmdb' | head -n 1)"
          cp "$MMDB_PATH" Country.mmdb
          ls -lh Country.mmdb
          file Country.mmdb

      - name: Commit and push
        shell: bash
        run: |
          set -euxo pipefail
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Country.mmdb
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update GeoIP"
          git push
