name: Update GeoIP

on:
  schedule:
    - cron: '0 3 * * 1'   # 每周一自动更新
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Download GeoLite2
      run: |
        curl -L -o GeoLite2.tar.gz "https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-Country&license_key=${{ secrets.MAXMIND_LICENSE_KEY }}&suffix=tar.gz"

    - name: Extract mmdb
      run: |
        tar -xzf GeoLite2.tar.gz
        mv GeoLite2-Country_*/GeoLite2-Country.mmdb Country.mmdb

    - name: Commit & Push
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add Country.mmdb
        git commit -m "Update GeoIP"
        git push
